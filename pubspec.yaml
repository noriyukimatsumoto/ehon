  dio: ^5.9.1
  easy_debounce: ^2.0.3
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_gen: ^5.12.0
  flutter_hooks: ^0.21.3+1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  freezed_annotation: ^3.1.0
